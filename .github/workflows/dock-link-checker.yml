name: Doc Link Checker

on:
  workflow_dispatch:
    inputs:
        siteUrl:
          description: 'Site URL to Check'
          default: 'https://is.docs.wso2.com/en/latest/'
          required: true
  schedule:
    - cron: '30 2 * * *' # Schedule to run once daily at 02:30 UTC

env:
  DEFAULT_URL: 'https://is.docs.wso2.com/en/latest/'

jobs:
  linkchecker:
    runs-on: ubuntu-latest

    steps:
      - name: Check repository
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$GITHUB_REPOSITORY" != "wso2/docs-is" ]; then
            echo "This scheduled action is disabled for forks."
            exit 0
          fi

      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install linkchecker beautifulsoup4

      - name: Run Link Checker
        run: |
          SITE_URL=${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          # --check-extern: check external links too (e.g. http://wso2.com/...)
          # -F csv: machine-readable output used by the filter script to detect
          #         broken links precisely via the result column (True/False),
          #         avoiding the false positives of string-matching on HTML
          # -F html: human-readable report preserved for the artifact upload
          linkchecker --check-extern -F csv -F html $SITE_URL --threads=100
        continue-on-error: true

      - name: Filter broken links and build report
        id: filter_html
        run: |
          cat > filter_script.py << 'PYEOF'
          import csv
          from bs4 import BeautifulSoup

          SITE_BASE   = 'https://is.docs.wso2.com/en/latest/'
          PAGE_NOT_FOUND = SITE_BASE + 'page-not-found'
          CSV_IN      = 'linkchecker-out.csv'
          HTML_IN     = 'linkchecker-out.html'
          HTML_OUT    = 'broken_links_report_IS.html'

          # ------------------------------------------------------------------
          # Step 1: Parse the CSV to build the exact set of broken URLs.
          #
          # linkchecker CSV columns (semicolon-separated):
          #   urlname ; parentname ; base ; result ; warningstring ;
          #   infostring ; valid ; url ; line ; col ; name
          #
          # The "valid" column is the authoritative flag:
          #   "True"  = link is OK
          #   "False" = link is broken (real HTTP error OR any other failure)
          #
          # Using CSV instead of HTML string-matching is what eliminates both
          # problems seen before:
          #   - False positives: "Not Found" / "Forbidden" appearing in page
          #     content or link text caused the HTML filter to flag valid links.
          #   - False negatives: external links returning real 404s were only
          #     caught once --check-extern was added; now with the valid column
          #     we catch ALL failures regardless of their type or origin.
          #
          # Additionally, a soft-404 check covers the WSO2 docs pattern where
          # missing pages return HTTP 200 but redirect to /page-not-found/.
          # linkchecker sees 200 and marks the link valid=True, so we
          # explicitly check whether the reported URL or its real URL contains
          # the page-not-found path.
          # ------------------------------------------------------------------
          broken_urls = set()

          with open(CSV_IN, newline='', encoding='utf-8') as f:
              for line in f:
                  if line.startswith('#') or not line.strip():
                      continue
                  row = [c.strip() for c in line.split(';')]
                  if len(row) < 8:
                      continue
                  urlname, parentname, base, result, warningstring, infostring, valid, url = row[:8]

                  # Hard failures reported by linkchecker (covers external 404s
                  # and any other connection / HTTP errors)
                  if valid.strip() == 'False':
                      broken_urls.add(urlname)

                  # Soft-404: linkchecker got a 200 but the final URL is the
                  # WSO2 page-not-found page
                  if PAGE_NOT_FOUND in url or PAGE_NOT_FOUND in urlname:
                      broken_urls.add(urlname)

          # ------------------------------------------------------------------
          # Step 2: Use the broken URL set to filter tables from the HTML
          # report. Each table in linkchecker's HTML output corresponds to one
          # checked URL, and the URL itself appears as a link in the table.
          # We match on the exact URL string so there are no false positives.
          # ------------------------------------------------------------------
          with open(HTML_IN, 'r', encoding='utf-8') as f:
              soup = BeautifulSoup(f, 'html.parser')

          tables = soup.find_all('table')
          broken_tables = [t for t in tables if any(url in str(t) for url in broken_urls)]

          # ------------------------------------------------------------------
          # Step 3: Build the output report
          # ------------------------------------------------------------------
          final_soup = BeautifulSoup(
              '<!DOCTYPE html><html><head></head><body></body></html>',
              'html.parser'
          )
          final_soup.head.append(soup.head)

          h1 = final_soup.new_tag('h1')
          h1.string = 'Broken Link Checker - ' + SITE_BASE
          final_soup.body.append(h1)

          count_p = final_soup.new_tag('p')
          count_p.string = f'Number of broken links found: {len(broken_tables)}'
          final_soup.body.append(count_p)
          final_soup.body.append(final_soup.new_tag('br'))

          for table in broken_tables:
              final_soup.body.append(table)
              final_soup.body.append(final_soup.new_tag('br'))

          final_soup.body.append(final_soup.new_tag('br'))

          with open(HTML_OUT, 'w', encoding='utf-8') as f:
              f.write(str(final_soup))

          with open('broken_link_count.txt', 'w') as f:
              f.write(str(len(broken_tables)))
          PYEOF

          python filter_script.py

          BROKEN_LINKS_COUNT=$(cat broken_link_count.txt)
          echo "broken_links_count=$BROKEN_LINKS_COUNT" >> $GITHUB_ENV

      - name: Upload HTML as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: broken_links_report_IS
          path: broken_links_report_IS.html

      - name: Notify Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          SITE_URL: ${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          THREAD_NAME: "BrokenLinkCheckerWSO2IS"
          BROKEN_LINKS_COUNT: ${{ env.broken_links_count }}
        run: |
          MESSAGE_JSON=$(cat <<EOF
          {
            "cards": [
              {
                "header": {
                  "title": "Broken Link Checker Report - WSO2 IS",
                  "subtitle": "${SITE_URL}",
                  "imageUrl": "https://biq.cloud/wp-content/uploads/2021/01/broken-link-building.gif"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Report Details",
                          "content": "Broken Links Found: ${BROKEN_LINKS_COUNT}"
                        }
                      },
                      {
                        "buttons": [
                          {
                            "textButton": {
                              "text": "VIEW REPORT",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                }
                              }
                            }
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-Type: application/json' -d "$MESSAGE_JSON" "$WEBHOOK_URL&threadKey=$THREAD_NAME&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
