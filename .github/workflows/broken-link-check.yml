name: Broken Link Checker

on:
  workflow_dispatch:
    inputs:
        siteUrl:
          description: 'Site URL to Check'
          default: 'https://is.docs.wso2.com/en/latest/'
          required: true
  schedule:
    - cron: '30 2 * * *' # Schedule to run once daily at 02:30 UTC

env:
  DEFAULT_URL: 'https://is.docs.wso2.com/en/latest/'

jobs:
  linkchecker:
    runs-on: ubuntu-latest

    steps:
      - name: Check repository
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$GITHUB_REPOSITORY" != "wso2/docs-is" ]; then
            echo "This scheduled action is disabled for forks."
            exit 0
          fi

      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install linkchecker beautifulsoup4

      - name: Run Link Checker
        run: |
          SITE_URL=${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          # --check-extern: also check external links (e.g. http://wso2.com/...),
          # not just internal ones. Without this flag, linkchecker silently skips
          # every link pointing outside is.docs.wso2.com, which is why broken
          # external links like http://wso2.com/products/identity-server/ were
          # never caught.
          linkchecker --check-extern -F html $SITE_URL --threads=100
        continue-on-error: true

      - name: Filter HTML for specific string and preserve page structure
        id: filter_html
        run: |
          cat > filter_script.py << 'PYEOF'
          from bs4 import BeautifulSoup

          website_url = 'https://is.docs.wso2.com/en/latest/'

          with open('linkchecker-out.html', 'r') as file:
              soup = BeautifulSoup(file, 'html.parser')

          # Match tables that linkchecker has flagged as broken.
          # This now covers two cases:
          #   1. Internal links that resolve to the WSO2 /page-not-found/ soft-404
          #   2. External links that returned a real HTTP error (4xx/5xx),
          #      e.g. http://wso2.com/products/identity-server/ returning 404.
          #      linkchecker reports these with the text "404 Not Found" or
          #      similar error strings directly in the table, so they are caught
          #      automatically once --check-extern is enabled.
          string_to_filter = 'https://is.docs.wso2.com/en/latest/page-not-found'

          final_soup = BeautifulSoup(
              '<!DOCTYPE html><html><head></head><body></body></html>',
              'html.parser'
          )
          final_soup.head.append(soup.head)

          header_tag = final_soup.new_tag('h1')
          header_tag.string = 'Broken Link Checker - ' + website_url
          final_soup.body.append(header_tag)

          tables = soup.find_all('table')

          # Collect broken tables:
          #   - internal soft-404s (redirect to /page-not-found/)
          #   - external hard errors reported by linkchecker (now visible
          #     because --check-extern is enabled)
          broken_tables = []
          for table in tables:
              table_str = str(table)
              is_internal_soft_404 = string_to_filter in table_str
              # linkchecker flags external broken links with error text in the
              # Result column. A "Not Found" or 4xx/5xx in the table means the
              # link genuinely failed — not just redirected to a soft 404.
              is_external_error = (
                  'Not Found' in table_str or
                  'Error' in table_str or
                  'Forbidden' in table_str
              ) and string_to_filter not in table_str  # avoid double-counting
              if is_internal_soft_404 or is_external_error:
                  broken_tables.append(table)

          broken_link_count = len(broken_tables)

          with open('broken_link_count.txt', 'w') as count_file:
              count_file.write(str(broken_link_count))

          count_tag = final_soup.new_tag('p')
          count_tag.string = 'Number of broken links found: ' + str(broken_link_count)
          final_soup.body.append(count_tag)
          final_soup.body.append(final_soup.new_tag('br'))

          for table in broken_tables:
              final_soup.body.append(table)
              final_soup.body.append(final_soup.new_tag('br'))

          final_soup.body.append(final_soup.new_tag('br'))

          with open('broken_links_report_IS.html', 'w') as file:
              file.write(str(final_soup))
          PYEOF

          python filter_script.py

          BROKEN_LINKS_COUNT=$(cat broken_link_count.txt)
          echo "broken_links_count=$BROKEN_LINKS_COUNT" >> $GITHUB_ENV

      - name: Upload HTML as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: broken_links_report_IS
          path: broken_links_report_IS.html

      - name: Notify Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          SITE_URL: ${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          THREAD_NAME: "BrokenLinkCheckerWSO2IS"
          BROKEN_LINKS_COUNT: ${{ env.broken_links_count }}
        run: |
          MESSAGE_JSON=$(cat <<EOF
          {
            "cards": [
              {
                "header": {
                  "title": "Broken Link Checker Report - WSO2 IS",
                  "subtitle": "${SITE_URL}",
                  "imageUrl": "https://biq.cloud/wp-content/uploads/2021/01/broken-link-building.gif"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Report Details",
                          "content": "Broken Links Found: ${BROKEN_LINKS_COUNT}"
                        }
                      },
                      {
                        "buttons": [
                          {
                            "textButton": {
                              "text": "VIEW REPORT",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                }
                              }
                            }
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-Type: application/json' -d "$MESSAGE_JSON" "$WEBHOOK_URL&threadKey=$THREAD_NAME&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
