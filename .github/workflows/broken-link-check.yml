name: Broken Link Checker

on:
  workflow_dispatch:
    inputs:
        siteUrl:
          description: 'Site URL to Check'
          default: 'https://is.docs.wso2.com/en/latest/'
          required: true
  schedule:
    - cron: '30 2 * * *' # Schedule to run once daily at 02:30 UTC

env:
  DEFAULT_URL: 'https://is.docs.wso2.com/en/latest/'

jobs:
  linkchecker:
    runs-on: ubuntu-latest

    steps:
      - name: Check repository
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$GITHUB_REPOSITORY" != "wso2/docs-is" ]; then
            echo "This scheduled action is disabled for forks."
            exit 0
          fi

      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install linkchecker beautifulsoup4 requests

      - name: Run Link Checker
        run: |
          SITE_URL=${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          linkchecker -F html $SITE_URL --threads=100
        continue-on-error: true

      - name: Write filter and soft-404 detection script
        run: |
          cat > filter_script.py << 'PYEOF'
          from bs4 import BeautifulSoup
          import requests
          import re

          SITE_BASE = 'https://is.docs.wso2.com/en/latest/'
          PAGE_NOT_FOUND_URL = 'https://is.docs.wso2.com/en/latest/page-not-found'
          REPORT_INPUT = 'linkchecker-out.html'
          REPORT_OUTPUT = 'broken_links_report_IS.html'

          # ---------------------------------------------------------------
          # Soft-404 check: request the URL and see if the server silently
          # redirects to /page-not-found/. This catches pages that don't
          # exist yet but return HTTP 200 instead of a real 404 — which
          # means linkchecker considers them valid and never flags them.
          #
          # This is exactly why links like "MCP Server Quick Start -
          # TypeScript/Python" listed under the #whats-next section go
          # undetected: they are real hrefs pointing to pages that haven't
          # been created, the server redirects to /page-not-found/ with a
          # 200, so linkchecker sees 200 and moves on.
          # ---------------------------------------------------------------
          def is_soft_404(url):
              """Return True if the URL ultimately resolves to the
              page-not-found page, regardless of the HTTP status code."""
              # Strip fragment — fragments are client-side only, the server
              # never sees them, so we just need to verify the page exists.
              bare_url = url.split('#')[0]
              try:
                  resp = requests.get(bare_url, allow_redirects=True, timeout=15)
                  return PAGE_NOT_FOUND_URL in resp.url
              except Exception:
                  return False

          # ---------------------------------------------------------------
          # Parse the linkchecker HTML report
          # ---------------------------------------------------------------
          with open(REPORT_INPUT, 'r', encoding='utf-8') as f:
              soup = BeautifulSoup(f, 'html.parser')

          tables = soup.find_all('table')

          # ---------------------------------------------------------------
          # Two-pass broken link detection:
          #
          # Pass 1 (original): linkchecker already logged /page-not-found
          #   in the report — keep that behaviour unchanged.
          #
          # Pass 2 (new): for every internal link found in each table that
          #   linkchecker did NOT flag, do a live soft-404 check. This is
          #   what catches the "MCP Server Quick Start" links and any other
          #   pages that the site serves as a 200 /page-not-found/.
          # ---------------------------------------------------------------
          broken_tables = []
          checked_urls = {}  # cache to avoid re-requesting the same URL

          for table in tables:
              table_str = str(table)

              # Pass 1 — already flagged by linkchecker
              if PAGE_NOT_FOUND_URL in table_str:
                  broken_tables.append({
                      'table': table,
                      'reason': 'linkchecker detected redirect to /page-not-found/',
                      'url': None
                  })
                  continue

              # Pass 2 — extract all internal hrefs from the table and
              # check each one live for a soft-404.
              internal_links = re.findall(
                  r'https://is\.docs\.wso2\.com/en/latest/[^\s"\'<>]+',
                  table_str
              )

              found_soft_404 = None
              for link in internal_links:
                  bare = link.split('#')[0].rstrip('/')
                  if bare not in checked_urls:
                      checked_urls[bare] = is_soft_404(link)
                  if checked_urls[bare]:
                      found_soft_404 = link
                      break

              if found_soft_404:
                  broken_tables.append({
                      'table': table,
                      'reason': f'page does not exist (soft 404): {found_soft_404}',
                      'url': found_soft_404
                  })

          # ---------------------------------------------------------------
          # Build the output HTML report
          # ---------------------------------------------------------------
          final_soup = BeautifulSoup(
              '<!DOCTYPE html><html><head></head><body></body></html>',
              'html.parser'
          )
          final_soup.head.append(soup.head)

          h1 = final_soup.new_tag('h1')
          h1.string = f'Broken Link Checker - {SITE_BASE}'
          final_soup.body.append(h1)

          count_p = final_soup.new_tag('p')
          count_p.string = f'Number of broken links found: {len(broken_tables)}'
          final_soup.body.append(count_p)
          final_soup.body.append(final_soup.new_tag('br'))

          for entry in broken_tables:
              reason_p = final_soup.new_tag('p')
              reason_p.string = f'Detected via: {entry["reason"]}'
              final_soup.body.append(reason_p)
              final_soup.body.append(entry['table'])
              final_soup.body.append(final_soup.new_tag('br'))

          with open(REPORT_OUTPUT, 'w', encoding='utf-8') as f:
              f.write(str(final_soup))

          with open('broken_link_count.txt', 'w') as f:
              f.write(str(len(broken_tables)))

          print(f'Done. Broken links found: {len(broken_tables)}')
          PYEOF

      - name: Filter HTML report
        id: filter_html
        run: |
          python filter_script.py

          BROKEN_LINKS_COUNT=$(cat broken_link_count.txt)
          echo "broken_links_count=$BROKEN_LINKS_COUNT" >> $GITHUB_ENV

      - name: Upload HTML as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: broken_links_report_IS
          path: broken_links_report_IS.html

      - name: Notify Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          SITE_URL: ${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          THREAD_NAME: "BrokenLinkCheckerWSO2IS"
          BROKEN_LINKS_COUNT: ${{ env.broken_links_count }}
        run: |
          MESSAGE_JSON=$(cat <<EOF
          {
            "cards": [
              {
                "header": {
                  "title": "Broken Link Checker Report - WSO2 IS",
                  "subtitle": "${SITE_URL}",
                  "imageUrl": "https://biq.cloud/wp-content/uploads/2021/01/broken-link-building.gif"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Report Details",
                          "content": "Broken Links Found: ${BROKEN_LINKS_COUNT}"
                        }
                      },
                      {
                        "buttons": [
                          {
                            "textButton": {
                              "text": "VIEW REPORT",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                }
                              }
                            }
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-Type: application/json' -d "$MESSAGE_JSON" "$WEBHOOK_URL&threadKey=$THREAD_NAME&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
