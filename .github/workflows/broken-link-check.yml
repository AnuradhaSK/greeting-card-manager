name: Broken Link Checker

on:
  workflow_dispatch:
    inputs:
      siteUrl:
        description: 'Site URL to Check'
        default: 'https://is.docs.wso2.com/en/latest/'
        required: true
  schedule:
    - cron: '30 2 * * *' # Run once daily at 02:30 UTC

env:
  DEFAULT_URL: 'https://is.docs.wso2.com/en/latest/'

jobs:
  linkchecker:
    runs-on: ubuntu-latest

    steps:
      # ── Guard: disable scheduled runs on forks ────────────────────────────────
      - name: Check repository
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$GITHUB_REPOSITORY" != "wso2/docs-is" ]; then
            echo "This scheduled action is disabled for forks."
            exit 0
          fi

      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install linkchecker beautifulsoup4 requests

      # ── Phase 1: Standard linkchecker (catches static/crawlable links) ────────
      - name: Run Standard Link Checker
        run: |
          SITE_URL=${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          linkchecker -F html "$SITE_URL" --threads=100
        continue-on-error: true

      # ── Phase 2: Source Markdown link checker ─────────────────────────────────
      # Reads every .md file in the repo, resolves all relative links to absolute
      # URLs the same way MkDocs does, then checks each for hard errors (4xx/5xx)
      # and WSO2-style soft 404s (URL contains "page-not-found").
      # This catches links inside card grids, macros, and any JS-rendered sections
      # that the standard crawler cannot see.
      - name: Run Source Markdown Link Checker
        run: |
          cat > md_link_checker.py << 'PYEOF'
          import os
          import re
          import json
          import requests
          from pathlib import Path
          from urllib.parse import urljoin
          from concurrent.futures import ThreadPoolExecutor, as_completed

          # ── Configuration ──────────────────────────────────────────────────────
          DOCS_DIR        = Path("en/docs")
          BASE_URL        = "${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}"
          if not BASE_URL.endswith("/"):
              BASE_URL += "/"
          SOFT_404        = "page-not-found"
          MAX_WORKERS     = 30
          REQUEST_TIMEOUT = 15

          # Patterns to extract links from Markdown and inline HTML
          MD_LINK_RE   = re.compile(r'\[([^\]]*)\]\(([^)#\s][^)\s]*)\)')
          HTML_HREF_RE = re.compile(r'href=["\']([^"\'#][^"\']*)["\']')

          # Skip asset files — we only care about navigable pages
          SKIP_EXTENSIONS = {
              ".png", ".jpg", ".jpeg", ".gif", ".svg", ".webp",
              ".pdf", ".zip", ".tar", ".gz", ".mp4", ".mp3",
              ".ico", ".woff", ".woff2", ".ttf", ".eot", ".css", ".js",
          }

          session = requests.Session()
          session.headers["User-Agent"] = "WSO2-BrokenLinkChecker/3.0"

          # ── Helpers ────────────────────────────────────────────────────────────
          def md_file_to_url(md_path: Path) -> str:
              """
              Map a repository .md file to its published URL.
              en/docs/guides/agentic-ai/mcp.md  →  BASE_URL + guides/agentic-ai/mcp/
              en/docs/guides/index.md            →  BASE_URL + guides/
              """
              rel   = md_path.relative_to(DOCS_DIR)
              parts = list(rel.parts)
              if parts[-1].lower() in ("index.md", "readme.md"):
                  parts = parts[:-1]
              else:
                  parts[-1] = parts[-1][:-3]          # strip .md
              return BASE_URL + "/".join(parts) + ("/" if parts else "")

          def should_skip(href: str) -> bool:
              """Return True for links we never want to check."""
              if href.startswith(("mailto:", "javascript:", "tel:", "#", "{")):
                  return True
              ext = os.path.splitext(href.split("?")[0])[-1].lower()
              if ext in SKIP_EXTENSIONS:
                  return True
              return False

          def resolve(raw_href: str, source_md: Path) -> str | None:
              """
              Turn a raw href into a fully-qualified URL.
              Relative paths are resolved against the page's published URL,
              exactly as MkDocs does at build time.
              """
              href = raw_href.strip().split("#")[0].split("?")[0]
              if not href or should_skip(href):
                  return None
              if href.startswith(("http://", "https://")):
                  return href
              page_url = md_file_to_url(source_md)
              return urljoin(page_url, href)

          def check_url(url: str) -> tuple[str, bool, str]:
              """Returns (url, is_broken, reason)."""
              try:
                  r = session.get(url, timeout=REQUEST_TIMEOUT, allow_redirects=True)
                  if SOFT_404 in r.url:
                      return url, True, f"soft-404 → {r.url}"
                  if r.status_code >= 400:
                      return url, True, f"HTTP {r.status_code}"
                  return url, False, ""
              except requests.exceptions.Timeout:
                  return url, True, "timeout"
              except Exception as exc:
                  return url, True, f"error: {exc}"

          # ── Collect all links from all .md files ───────────────────────────────
          to_check: list[dict] = []

          if not DOCS_DIR.is_dir():
              print(f"WARNING: {DOCS_DIR} not found — skipping source MD check.")
          else:
              for md_path in sorted(DOCS_DIR.rglob("*.md")):
                  text = md_path.read_text(encoding="utf-8", errors="replace")

                  found: list[tuple[str, str]] = []
                  for m in MD_LINK_RE.finditer(text):
                      found.append((m.group(1), m.group(2)))
                  for m in HTML_HREF_RE.finditer(text):
                      found.append(("", m.group(1)))

                  for link_text, raw_href in found:
                      resolved = resolve(raw_href, md_path)
                      if resolved:
                          to_check.append({
                              "source_file": str(md_path),
                              "source_url":  md_file_to_url(md_path),
                              "link_text":   link_text.strip(),
                              "href_raw":    raw_href,
                              "resolved_url": resolved,
                          })

          print(f"Found {len(to_check)} links across {DOCS_DIR} — checking...")

          # ── Check each unique URL once, in parallel ────────────────────────────
          unique_urls  = list({item["resolved_url"] for item in to_check})
          broken_urls: dict[str, str] = {}   # url → reason

          with ThreadPoolExecutor(max_workers=MAX_WORKERS) as ex:
              futures = {ex.submit(check_url, url): url for url in unique_urls}
              done = 0
              for future in as_completed(futures):
                  url, is_broken, reason = future.result()
                  done += 1
                  if done % 100 == 0:
                      print(f"  checked {done}/{len(unique_urls)} unique URLs ...")
                  if is_broken:
                      broken_urls[url] = reason

          # ── Emit one row per source occurrence of a broken URL ─────────────────
          broken_rows = [
              {**item, "reason": broken_urls[item["resolved_url"]]}
              for item in to_check
              if item["resolved_url"] in broken_urls
          ]

          with open("md_broken_links.json", "w") as f:
              json.dump(broken_rows, f, indent=2)

          print(f"\nBroken links: {len(broken_rows)} occurrences "
                f"({len(broken_urls)} unique URLs)")
          PYEOF
          python md_link_checker.py
        continue-on-error: true

      # ── Merge both reports into a single HTML file ────────────────────────────
      - name: Merge and Build Report
        id: build_report
        run: |
          cat > merge_reports.py << 'PYEOF'
          import json
          from bs4 import BeautifulSoup

          SITE_URL   = "${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}"
          SOFT_404   = "page-not-found"
          OUT_FILE   = "broken_links_report_IS.html"

          CSS = """
          body  { font-family: Arial, sans-serif; margin: 2em; color: #222; }
          h1    { color: #c0392b; }
          h2    { color: #2c3e50; margin-top: 2.5em; border-bottom: 2px solid #ecf0f1; padding-bottom: .3em; }
          p     { margin: .5em 0; }
          .badge{ background: #e74c3c; color: #fff; border-radius: 4px;
                  padding: 2px 10px; font-size: .95em; font-weight: bold; }
          .zero { background: #27ae60; }
          table { border-collapse: collapse; width: 100%; margin-bottom: 1.5em; font-size: .9em; }
          th    { background: #2c3e50; color: #fff; padding: 8px 10px; text-align: left; }
          td    { padding: 7px 10px; border: 1px solid #ddd; word-break: break-all; }
          tr:nth-child(even) td { background: #f7f9fa; }
          a     { color: #2980b9; }
          """

          # ── 1. Parse linkchecker HTML output ───────────────────────────────────
          lc_broken_tables = []
          try:
              with open("linkchecker-out.html", "r") as f:
                  lc_soup = BeautifulSoup(f, "html.parser")
              lc_broken_tables = [
                  t for t in lc_soup.find_all("table")
                  if SOFT_404 in str(t)
              ]
          except FileNotFoundError:
              pass

          # ── 2. Parse source-MD JSON output ─────────────────────────────────────
          md_broken = []
          try:
              with open("md_broken_links.json", "r") as f:
                  md_broken = json.load(f)
          except FileNotFoundError:
              pass

          # ── 3. Build HTML report ────────────────────────────────────────────────
          total = len(lc_broken_tables) + len(md_broken)

          doc = BeautifulSoup(
              f"<!DOCTYPE html><html><head>"
              f"<meta charset='utf-8'>"
              f"<title>Broken Link Report – WSO2 IS</title>"
              f"<style>{CSS}</style>"
              f"</head><body></body></html>",
              "html.parser"
          )
          body = doc.body

          # Title
          h1 = doc.new_tag("h1")
          h1.string = f"Broken Link Checker Report – {SITE_URL}"
          body.append(h1)

          # Summary badge
          summary = doc.new_tag("p")
          badge = doc.new_tag("span", attrs={"class": "badge" + (" zero" if total == 0 else "")})
          badge.string = str(total)
          summary.append(badge)
          summary.append(f"  total broken link{'s' if total != 1 else ''} found")
          body.append(summary)

          # ── Section A: linkchecker results ─────────────────────────────────────
          h2a = doc.new_tag("h2")
          h2a.string = f"Phase 1 — Static Crawler Results  ({len(lc_broken_tables)} broken)"
          body.append(h2a)

          if lc_broken_tables:
              for t in lc_broken_tables:
                  body.append(t)
                  body.append(doc.new_tag("br"))
          else:
              p = doc.new_tag("p")
              p.string = "No broken links detected by the static crawler."
              body.append(p)

          # ── Section B: source-MD results ───────────────────────────────────────
          h2b = doc.new_tag("h2")
          h2b.string = f"Phase 2 — Source Markdown Results  ({len(md_broken)} broken occurrences)"
          body.append(h2b)

          if md_broken:
              table = doc.new_tag("table")

              # Header row
              thead_tr = doc.new_tag("tr")
              for col in ["Source .md File", "Source Page URL", "Link Text", "Raw Link in Source", "Resolved URL", "Reason"]:
                  th = doc.new_tag("th")
                  th.string = col
                  thead_tr.append(th)
              table.append(thead_tr)

              for item in md_broken:
                  tr = doc.new_tag("tr")

                  # Source .md file (plain text)
                  td1 = doc.new_tag("td")
                  td1.string = item.get("source_file", "")
                  tr.append(td1)

                  # Source page URL (linked)
                  td2 = doc.new_tag("td")
                  src_url = item.get("source_url", "")
                  a2 = doc.new_tag("a", href=src_url, target="_blank")
                  a2.string = src_url
                  td2.append(a2)
                  tr.append(td2)

                  # Link text
                  td3 = doc.new_tag("td")
                  td3.string = item.get("link_text", "") or "–"
                  tr.append(td3)

                  # Raw link as written in the .md source
                  td4 = doc.new_tag("td")
                  td4.string = item.get("href_raw", "")
                  tr.append(td4)

                  # Resolved (absolute) URL (linked)
                  td5 = doc.new_tag("td")
                  res_url = item.get("resolved_url", "")
                  a5 = doc.new_tag("a", href=res_url, target="_blank")
                  a5.string = res_url
                  td5.append(a5)
                  tr.append(td5)

                  # Reason (soft-404 / HTTP code / error)
                  td6 = doc.new_tag("td")
                  td6.string = item.get("reason", "")
                  tr.append(td6)

                  table.append(tr)

              body.append(table)
          else:
              p = doc.new_tag("p")
              p.string = "No broken links detected in the source Markdown files."
              body.append(p)

          # Write report + count
          with open(OUT_FILE, "w", encoding="utf-8") as f:
              f.write(str(doc))

          with open("broken_link_count.txt", "w") as f:
              f.write(str(total))

          print(f"Report → {OUT_FILE}   (total broken: {total})")
          PYEOF
          python merge_reports.py

          echo "broken_links_count=$(cat broken_link_count.txt)" >> $GITHUB_ENV

      # ── Upload report artifact ─────────────────────────────────────────────────
      - name: Upload HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: broken_links_report_IS
          path: broken_links_report_IS.html

      # ── Notify Google Chat ─────────────────────────────────────────────────────
      - name: Notify Google Chat
        env:
          WEBHOOK_URL:         ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          SITE_URL:            ${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          THREAD_NAME:         "BrokenLinkCheckerWSO2IS"
          BROKEN_LINKS_COUNT:  ${{ env.broken_links_count }}
        run: |
          MESSAGE_JSON=$(cat <<EOF
          {
            "cards": [
              {
                "header": {
                  "title": "Broken Link Checker Report - WSO2 IS",
                  "subtitle": "${SITE_URL}",
                  "imageUrl": "https://biq.cloud/wp-content/uploads/2021/01/broken-link-building.gif"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Report Details",
                          "content": "Broken Links Found: ${BROKEN_LINKS_COUNT}"
                        }
                      },
                      {
                        "buttons": [
                          {
                            "textButton": {
                              "text": "VIEW REPORT",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                }
                              }
                            }
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-Type: application/json' -d "$MESSAGE_JSON" \
            "$WEBHOOK_URL&threadKey=$THREAD_NAME&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
