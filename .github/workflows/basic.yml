name: Basic Checker

on:
  workflow_dispatch:
    inputs:
        siteUrl:
          description: 'Site URL to Check'
          default: 'https://is.docs.wso2.com/en/latest/'
          required: true
  schedule:
    - cron: '30 2 * * *' # Schedule to run once daily at 02:30 UTC

env:
  DEFAULT_URL: 'https://is.docs.wso2.com/en/latest/'

jobs:
  linkchecker:
    runs-on: ubuntu-latest

    steps:
      - name: Check repository
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$GITHUB_REPOSITORY" != "wso2/docs-is" ]; then
            echo "This scheduled action is disabled for forks."
            exit 0
          fi

      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install linkchecker
          pip install beautifulsoup4

      - name: Run Link Checker
        run: |
          SITE_URL=${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          linkchecker \
            --check-extern \
            --threads=100 \
            --ignore-url='^https?://localhost(:[0-9]+)?(/|$)' \
            -F csv \
            -F html \
            "$SITE_URL"
        continue-on-error: true

      - name: Filter broken links and build report
        id: filter_html
        run: |
          cat > filter_script.py << 'PYEOF'
          import csv
          from bs4 import BeautifulSoup

          WEBSITE_URL = 'https://is.docs.wso2.com/en/latest/'
          PAGE_NOT_FOUND_PATH = '/en/latest/page-not-found/'
          PAGE_NOT_FOUND_URLS = (
              f'{WEBSITE_URL}page-not-found',
              f'{WEBSITE_URL}page-not-found/',
          )
          LOCALHOST_PREFIXES = (
              'http://localhost',
              'https://localhost',
          )
          IGNORE_ERROR_TOKENS = (
              '403',
              'forbidden',
              '429 too many requests',
              'connectionerror',
          )

          broken_urls = set()
          with open('linkchecker-out.csv', 'r', encoding='utf-8', newline='') as csv_file:
              reader = csv.reader(csv_file, delimiter=';')
              for parts in reader:
                  if not parts:
                      continue
                  if parts[0].startswith('#'):
                      continue
                  if len(parts) < 8:
                      continue

                  # linkchecker fields:
                  # 0 urlname, 1 parentname, 3 result, 6 valid, 7 final url
                  urlname = parts[0].strip()
                  parentname = parts[1].strip()
                  result = parts[3].strip()
                  valid = parts[6].strip()
                  final_url = parts[7].strip()

                  if urlname.startswith(LOCALHOST_PREFIXES) or final_url.startswith(LOCALHOST_PREFIXES):
                      continue

                  # Skip false positives discovered in docs runs:
                  # - 429 rate limit responses
                  # - transient sample hostname resolution failures
                  # - entries found from /page-not-found/ parent pages
                  result_lower = result.lower()
                  should_ignore_result = any(token in result_lower for token in IGNORE_ERROR_TOKENS)
                  parent_is_page_not_found = any(url in parentname for url in PAGE_NOT_FOUND_URLS)
                  if should_ignore_result or parent_is_page_not_found:
                      continue

                  is_soft_404 = PAGE_NOT_FOUND_PATH in final_url
                  is_hard_failure = (valid == 'False')

                  if is_soft_404 or is_hard_failure:
                      broken_urls.add(urlname)
                      broken_urls.add(final_url)

          with open('linkchecker-out.html', 'r', encoding='utf-8') as html_file:
              soup = BeautifulSoup(html_file, 'html.parser')

          tables = soup.find_all('table')
          broken_tables = []
          for table in tables:
              table_str = str(table)
              table_link_values = set()
              for anchor in table.find_all('a'):
                  href = (anchor.get('href') or '').strip()
                  text = anchor.get_text(strip=True)
                  if href:
                      table_link_values.add(href)
                  if text:
                      table_link_values.add(text)

              has_known_broken_url = any(url and url in table_link_values for url in broken_urls)
              # Keep explicit soft-404 table matching so redirected links that
              # end on /page-not-found/ are always included even if linkchecker
              # reports them as Valid: 200 OK.
              has_soft_404_marker = PAGE_NOT_FOUND_PATH in table_str
              parent_is_page_not_found = any(
                  parent_url in table_link_values for parent_url in PAGE_NOT_FOUND_URLS
              )
              page_is_page_not_found = any(
                  page_url in table_link_values for page_url in PAGE_NOT_FOUND_URLS
              )
              if (has_known_broken_url or has_soft_404_marker) and not (
                  parent_is_page_not_found or page_is_page_not_found
              ):
                  broken_tables.append(table)

          final_soup = BeautifulSoup('<!DOCTYPE html><html><head></head><body></body></html>', 'html.parser')
          final_soup.head.append(soup.head)

          header_tag = final_soup.new_tag('h1')
          header_tag.string = f'Broken Link Checker - {WEBSITE_URL}'
          final_soup.body.append(header_tag)

          count_tag = final_soup.new_tag('p')
          count_tag.string = f'Number of broken links found: {len(broken_tables)}'
          final_soup.body.append(count_tag)
          final_soup.body.append(final_soup.new_tag('br'))

          for table in broken_tables:
              final_soup.body.append(table)
              final_soup.body.append(final_soup.new_tag('br'))

          final_soup.body.append(final_soup.new_tag('br'))

          with open('broken_links_report_IS.html', 'w', encoding='utf-8') as output_file:
              output_file.write(str(final_soup))

          with open('broken_link_count.txt', 'w', encoding='utf-8') as count_file:
              count_file.write(str(len(broken_tables)))
          PYEOF
          python filter_script.py
  
          BROKEN_LINKS_COUNT=$(cat broken_link_count.txt)
          echo "broken_links_count=$BROKEN_LINKS_COUNT" >> $GITHUB_ENV

      - name: Upload HTML as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: broken_links_report_IS
          path: broken_links_report_IS.html

      - name: Notify Google Chat
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          SITE_URL: ${{ github.event.inputs.siteUrl || env.DEFAULT_URL }}
          THREAD_NAME: "BrokenLinkCheckerWSO2IS"
          BROKEN_LINKS_COUNT: ${{ env.broken_links_count }}
        run: |
          MESSAGE_JSON=$(cat <<EOF
          {
            "cards": [
              {
                "header": {
                  "title": "Broken Link Checker Report - WSO2 IS",
                  "subtitle": "${SITE_URL}",
                  "imageUrl": "https://biq.cloud/wp-content/uploads/2021/01/broken-link-building.gif"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Report Details",
                          "content": "Broken Links Found: ${BROKEN_LINKS_COUNT}"
                        }
                      },
                      {
                        "buttons": [
                          {
                            "textButton": {
                              "text": "VIEW REPORT",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                }
                              }
                            }
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-Type: application/json' -d "$MESSAGE_JSON" "$WEBHOOK_URL&threadKey=$THREAD_NAME&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
